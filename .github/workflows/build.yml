name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # per allegare gli APK alle Release sui tag

jobs:
  debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: EasyTube-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Build & publish signed release APK
    # gira solo sui tag v*  (es. git tag v1.0.0 && git push --tags)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Ricostruisci keystore + keystore.properties dai secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Secret KEYSTORE_BASE64 mancante. Configura i secret di firma (vedi README) per buildare release in CI."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > easytube-release.keystore
          {
            echo "storeFile=easytube-release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Pulisci i segreti
        if: always()
        run: rm -f easytube-release.keystore keystore.properties

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: EasyTube-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Allega l'APK alla Release
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/*.apk
